apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibe-app
  namespace: vibe
spec:
  replicas: 2

  selector:
    matchLabels:
      app: vibe-app

  template:
    metadata:
      labels:
        app: vibe-app

    spec:
      serviceAccountName: vibe-app

      containers:
        - name: vibe-app

          image: 161230539245.dkr.ecr.us-east-1.amazonaws.com/vibe-app:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          env:
            - name: AWS_REGION
              value: "us-east-1"

            - name: BEDROCK_MODEL_ID
              value: "us.amazon.nova-2-lite-v1:0"

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000

            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000

            initialDelaySeconds: 15
            periodSeconds: 20

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"
